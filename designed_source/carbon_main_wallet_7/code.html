<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "bg-main": "#1a1d23",
                        "card-bg": "#232730",
                        "border-color": "#2e323c",
                        "text-primary": "#e6e8ec",
                        "text-secondary": "#9aa1ac",
                        "accent": "#dce87a",
                    },
                    fontFamily: {
                        "sans": ["Inter", "system-ui"],
                        "display": ["Plus Jakarta Sans", "Inter"]
                    },
                    borderRadius: {
                        "2xl": "1.25rem",
                        "3xl": "2rem",
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-[#0f1115] text-text-primary antialiased selection:bg-accent selection:text-bg-main;
            }
        }
        .apple-shadow {
            box-shadow: 0 24px 48px -12px rgba(0,0,0,0.6);
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-effect {
            backdrop-filter: blur(12px);
            background: rgba(35, 39, 48, 0.8);
        }
        .pulse-accent {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen">
<div class="w-[360px] h-[640px] bg-bg-main shadow-2xl flex flex-col relative overflow-hidden border border-border-color rounded-[3rem]">
<header class="pt-8 px-8 flex items-center justify-between z-20">
<div class="flex flex-col">
<div class="flex items-center gap-1.5">
<div class="w-1.5 h-4 bg-accent rounded-full"></div>
<h2 class="text-xs font-bold tracking-widest font-display text-text-primary uppercase">Carbon</h2>
</div>
<div class="flex items-center gap-1 mt-1 opacity-60">
<span class="material-symbols-outlined text-[12px] text-accent">verified_user</span>
<span class="text-[10px] font-medium tracking-tight">Canton Mainnet</span>
</div>
</div>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-card-bg border border-border-color text-text-secondary hover:text-text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]">settings</span>
</button>
</header>
<main class="flex-1 flex flex-col px-8 pt-10 pb-8 relative z-10">
<div class="mb-2">
<p class="text-text-secondary text-sm font-medium">Good evening.</p>
</div>
<div class="flex flex-col mb-12">
<div class="flex items-baseline gap-1">
<span class="text-2xl font-medium text-text-secondary opacity-50">$</span>
<h1 class="text-5xl font-semibold tracking-tight font-display">3,482.20</h1>
</div>
<div class="flex items-center gap-2 mt-2">
<span class="text-xs font-medium text-accent">+2.4% today</span>
<span class="w-1 h-1 rounded-full bg-border-color"></span>
<span class="text-[10px] font-mono text-text-secondary">0x34A...8F2D</span>
</div>
</div>
<div class="mt-auto">
<div class="bg-card-bg/50 rounded-3xl p-6 border border-border-color apple-shadow mb-6">
<p class="text-[11px] text-text-secondary mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-[14px] text-accent">auto_awesome</span>
                        I'm ready to assist with your assets.
                    </p>
<button class="w-full bg-accent text-bg-main h-16 rounded-2xl flex items-center justify-between px-6 group transition-all hover:scale-[1.02] active:scale-[0.98]">
<span class="text-base font-bold tracking-tight">Start Transaction</span>
<span class="material-symbols-outlined text-[24px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
<div class="flex items-center justify-between px-2">
<div class="flex -space-x-2">
<div class="w-8 h-8 rounded-full bg-card-bg border-2 border-bg-main flex items-center justify-center text-[10px] font-bold">CTN</div>
<div class="w-8 h-8 rounded-full bg-card-bg border-2 border-bg-main flex items-center justify-center text-[10px] font-bold">ETH</div>
<div class="w-8 h-8 rounded-full bg-card-bg border-2 border-bg-main flex items-center justify-center text-[10px] font-bold text-accent">+1</div>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center gap-1.5">
<span class="w-1.5 h-1.5 rounded-full bg-green-500 pulse-accent"></span>
<span class="text-[10px] font-bold text-text-secondary uppercase tracking-widest">Secure</span>
</div>
</div>
</div>
</div>
</main>
<div class="absolute inset-x-0 bottom-0 top-0 glass-effect z-40 p-8 flex flex-col translate-y-[100%] transition-transform duration-500 pointer-events-none">
</div>
<footer class="px-8 pb-8 pt-2">
<div class="w-full h-[1px] bg-border-color mb-4"></div>
<div class="flex items-center justify-between group cursor-pointer opacity-60 hover:opacity-100 transition-opacity">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[18px]">history</span>
<span class="text-xs font-medium">Last: Sent 50 USDC</span>
</div>
<span class="text-[10px] text-text-secondary uppercase tracking-tighter">2h ago</span>
</div>
</footer>
<div class="absolute top-0 left-0 right-0 h-1 bg-accent/20">
<div class="w-1/3 h-full bg-accent"></div>
</div>
</div>
<div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-accent/5 rounded-full blur-[120px] -z-10"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-500/5 rounded-full blur-[120px] -z-10"></div>

</body></html>
